<style>
  :root{
    --bg:#F7F4EF; --card:#FFFFFF; --ink:#2B2622; --sub:#7A726A; --line:#ECE6DD;
    --food:#D9694B; --shop:#7C6AF7; --exp:#2E9E8F; --design:#C8921E; --spot:#8C8378;
    --home:#3A3530; --flight:#C8921E;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 6px 18px rgba(0,0,0,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Noto Sans TC",sans-serif;
    line-height:1.55;padding-bottom:50px}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}
  a{color:inherit}

  header{padding:24px 16px 12px;text-align:center}
  header .t{font-size:24px;font-weight:800;letter-spacing:.5px}
  header .s{color:var(--sub);font-size:14px;margin-top:4px}
  header .ver{display:inline-block;margin-top:7px;font-size:11px;color:#A89F94;letter-spacing:1px}

  /* 機票 / 住宿 摘要 */
  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0 14px}
  @media(max-width:520px){.summary{grid-template-columns:1fr}}
  .sm{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;box-shadow:var(--shadow);font-size:13px}
  .sm .h{font-size:11px;color:var(--sub);letter-spacing:1px;margin-bottom:6px;font-weight:700}
  .sm .ln{display:flex;justify-content:space-between;gap:8px;margin:2px 0}
  .sm .ln b{font-weight:700}
  .sm .seg{color:var(--sub)}
  .sm a.mini{display:inline-block;margin-top:7px;font-size:12px;color:#2563C9;
    text-decoration:none;font-weight:600}

  #map{height:320px;border-radius:18px;box-shadow:var(--shadow);margin:4px 0;z-index:0}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;
    font-size:12px;color:var(--sub);margin:10px 0 8px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .legend i{width:10px;height:10px;border-radius:50%;display:inline-block}

  /* 分日 tab */
  .tabs{position:sticky;top:0;z-index:500;background:var(--bg);
    display:flex;gap:7px;overflow-x:auto;padding:10px 0;margin:6px -16px 4px;
    padding-left:16px;padding-right:16px;-ms-overflow-style:none;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);
    border-radius:999px;padding:7px 13px;font-size:13px;font-weight:700;
    color:var(--ink);text-decoration:none;white-space:nowrap;box-shadow:var(--shadow)}
  .tab small{display:block;font-size:10px;color:var(--sub);font-weight:600}

  .day{margin:20px 0 6px;scroll-margin-top:64px}
  .day-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .day-head .d{font-size:20px;font-weight:800}
  .day-head .th{font-size:16px;font-weight:700;color:var(--ink)}
  .day-sub{font-size:12.5px;color:var(--sub);margin-bottom:12px}
  .day-sub .base{color:var(--home);font-weight:600}

  /* timeline */
  .tl{position:relative;margin-left:6px;padding-left:20px;
    border-left:2px solid var(--line)}
  .stop{position:relative;margin-bottom:11px}
  .stop::before{content:"";position:absolute;left:-27px;top:6px;width:11px;height:11px;
    border-radius:50%;background:var(--spot);border:2px solid var(--bg)}
  .stop.food::before{background:var(--food)} .stop.shop::before{background:var(--shop)}
  .stop.exp::before{background:var(--exp)} .stop.design::before{background:var(--design)}
  .stop.home::before{background:var(--home)} .stop.flight::before{background:var(--flight)}
  .time{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.5px}
  .stopcard{display:block;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-radius:13px;padding:11px 13px;margin-top:3px;
    box-shadow:var(--shadow)}
  .stopcard.plain{box-shadow:none;background:#FBF9F5;border-style:dashed}
  .nm{font-size:15.5px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .kr{font-size:11.5px;color:var(--sub);font-weight:500}
  .nt{font-size:13px;color:#5A534B;margin-top:3px}
  .go{font-size:12px;color:#2563C9;margin-top:5px;font-weight:600}
  .tag{font-size:10px;font-weight:800;padding:2px 7px;border-radius:6px;letter-spacing:.3px}
  .tag.book{background:#FDECEA;color:#C0392B}
  .tag.alt{background:#F1EEE7;color:#8A7E6C}
  .tag.cat-design{background:#FBF1D9;color:#946200}
  .transit{font-size:11.5px;color:var(--sub);margin:1px 0 1px 2px}

  .sec-title{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--sub);
    margin:30px 0 12px;display:flex;align-items:center;gap:8px}
  .sec-title::after{content:"";flex:1;height:1px;background:var(--line)}
  .note{font-size:12px;color:var(--sub);text-align:center;margin-top:26px;line-height:1.7}
  footer{text-align:center;color:#B6ADA2;font-size:11px;margin-top:22px;letter-spacing:1px}
</style>
</head>

};

// ─────────────────────────────────────────────
const COLORS={home:"#3A3530",food:"#D9694B",shop:"#7C6AF7",exp:"#2E9E8F",design:"#C8921E",spot:"#8C8378",flight:"#C8921E"};
function mapsUrl(q){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(q);}

// 地圖
const map=L.map('map',{scrollWheelZoom:false}).setView([37.554,126.985],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap, © CARTO',maxZoom:19}).addTo(map);
function dot(c,big){const s=big?16:13;return L.divIcon({className:'',iconSize:[s,s],iconAnchor:[s/2,s/2],
  html:`<div style="width:${s}px;height:${s}px;border-radius:50%;background:${c};border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>`});}
const bounds=[];
Object.values(P).forEach(p=>{
  if(p.nopin||p.lat==null)return;
  const big=p.cat==="home";
  L.marker([p.lat,p.lng],{icon:dot(COLORS[p.cat],big)}).addTo(map).bindPopup(
   `<div style="font-family:-apple-system,'PingFang TC',sans-serif;min-width:150px">
     <div style="font-weight:700;font-size:14px">${p.name}</div>
     ${p.kr?`<div style="font-size:11px;color:#888">${p.kr}</div>`:''}
     ${p.note?`<div style="font-size:12px;color:#555;margin:4px 0">${p.note}</div>`:''}
     <a href="${mapsUrl(p.q)}" target="_blank" rel="noopener" style="font-size:12px;font-weight:700;color:#2563C9;text-decoration:none">🧭 Google Maps 導航 →</a>
   </div>`);
  bounds.push([p.lat,p.lng]);
});
map.fitBounds(bounds,{padding:[28,28]});

// tab
document.getElementById('tabs').innerHTML = DAYS.map((d,i)=>
  `<a class="tab" href="#day${i+1}">${d.day}<small>${d.theme}</small></a>`).join('');

// 每日行程
function stopHTML(s){
  // 純資訊 / 轉乘
  if(s.transit) return `<div class="transit">↳ ${s.transit}</div>`;
  const p = s.id ? P[s.id] : null;
  const cat = s.flight?"flight":s.home?"home":s.spot?"spot":(p?p.cat:"spot");
  const name = s.label || s.name || (p?p.name:"");
  const kr = p&&p.kr ? p.kr : "";
  let note = s.note || (p?p.note:"");
  if(s.note2) note = (note?note+"，":"")+s.note2;
  const q = p?p.q:(s.q||null);
  // tags
  let tags="";
  if(s.tag==="book") tags+=`<span class="tag book">${s.tagtext||"已預訂"}</span>`;
  if(s.alt) tags+=`<span class="tag alt">${s.label||"備選"}</span>`;
  if(p&&p.cat==="design") tags+=`<span class="tag cat-design">設計順路</span>`;
  const time = s.time?`<div class="time">${s.time}</div>`:"";
  const clickable = q && !s.flight;
  const inner = `
    <div class="nm">${s.alt?(p?p.name:name):name}${tags}</div>
    ${kr?`<div class="kr">${kr}</div>`:""}
    ${note?`<div class="nt">${note}</div>`:""}
    ${clickable?`<div class="go">🧭 在 Google Maps 開啟 →</div>`:""}`;
  const card = clickable
    ? `<a class="stopcard${s.flight?' plain':''}" href="${mapsUrl(q)}" target="_blank" rel="noopener">${inner}</a>`
    : `<div class="stopcard plain">${inner}</div>`;
  return `<div class="stop ${cat}">${time}${card}</div>`;
}
document.getElementById('days').innerHTML = DAYS.map((d,i)=>`
  <section class="day" id="day${i+1}">
    <div class="day-head"><span class="d">${d.day}</span><span class="th">${d.theme}</span></div>
    <div class="day-sub">${d.date} · <span class="base">📍 ${d.base}</span></div>
    <div class="tl">${d.stops.map(stopHTML).join("")}</div>
  </section>`).join("");

// 候補
document.getElementById('backup').innerHTML = BACKUP.map(id=>{
  const p=P[id]; const extra=BACKUP_NOTE[id];
  return `<a class="stopcard" style="margin-bottom:9px" href="${mapsUrl(p.q)}" target="_blank" rel="noopener">
    <div class="nm">${p.name}${p.cat==="design"?'<span class="tag cat-design">設計</span>':''}</div>
    ${p.kr?`<div class="kr">${p.kr}</div>`:""}
    ${p.note?`<div class="nt">${p.note}</div>`:""}
    ${extra?`<div class="nt" style="color:#B06A2E">↳ ${extra}</div>`:""}
    <div class="go">🧭 在 Google Maps 開啟 →</div>
  </a>`;
}).join("");
</script>
</body>
</html>
