<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seoul D-Hub — 首爾行程 2025</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2EC;
  --card: #FDFAF6;
  --ink: #1C1A17;
  --muted: #6B665E;
  --border: #DDD9D2;
  --accent: #C8432A;
  --accent-bg: #FDF0ED;
  --blue: #3A6E9A;
  --blue-bg: #EBF3FA;
  --green: #3A7A55;
  --green-bg: #EAF4EF;
  --red: #C8432A;
  --red-bg: #FDF0ED;
  --purple: #6B5FA5;
  --purple-bg: #F0EEF9;
  --serif: 'Noto Serif TC', Georgia, serif;
  --mono: 'DM Mono', Consolas, monospace;
  --r: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--serif); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--ink); color: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 24px; gap: 16px;
}
.hdr-title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
.hdr-sub { font-size: 10px; font-family: var(--mono); opacity: 0.5; margin-top: 1px; }
.hdr-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.hbtn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.9); padding: 5px 11px; border-radius: 5px;
  cursor: pointer; font-size: 11px; font-family: var(--mono); transition: background 0.15s; white-space: nowrap;
}
.hbtn:hover { background: rgba(255,255,255,0.2); }
.ver { font-family: var(--mono); font-size: 10px; opacity: 0.3; margin-left: 4px; }

/* ── FLIGHT BAR ── */
.flight-bar {
  overflow: hidden; max-height: 0; transition: max-height 0.35s ease;
  background: var(--accent-bg); border-bottom: 1px solid var(--border);
}
.flight-bar.open { max-height: 160px; }
.flight-inner { padding: 16px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.fld { display: flex; flex-direction: column; gap: 4px; }
.fld label { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.fld input {
  background: white; border: 1px solid var(--border); border-radius: 5px;
  padding: 6px 10px; font-family: var(--mono); font-size: 12px; color: var(--ink); width: 140px; outline: none;
}
.fld input:focus { border-color: var(--accent); }
.fsave {
  background: var(--accent); color: white; border: none; border-radius: 5px;
  padding: 7px 16px; cursor: pointer; font-size: 13px; font-family: var(--serif); align-self: flex-end;
}
.fsave:hover { background: #a83520; }

/* ── DAY TABS ── */
.day-tabs {
  background: var(--card); border-bottom: 2px solid var(--border);
  display: flex; overflow-x: auto; padding: 0 20px; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 11px 18px; cursor: pointer; font-size: 12px; font-weight: 600;
  color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--serif); transition: all 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-date { display: block; font-size: 9px; font-family: var(--mono); opacity: 0.55; font-weight: 400; margin-top: 1px; }

/* ── LAYOUT ── */
.layout { display: flex; min-height: calc(100vh - 92px); }
.content { flex: 1; padding: 32px 28px; max-width: 720px; min-width: 0; }
.sidebar {
  width: 300px; flex-shrink: 0; background: var(--card);
  border-left: 1px solid var(--border); padding: 24px 18px 24px 20px;
  position: sticky; top: 50px; height: calc(100vh - 50px); overflow-y: auto;
}

/* ── DAY HEADER ── */
.day-header { margin-bottom: 28px; }
.day-header h2 { font-size: 22px; font-weight: 700; }
.day-meta { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

/* ── TIMELINE ── */
.timeline { position: relative; }
.timeline::before {
  content: ''; position: absolute;
  left: 79px; top: 12px; bottom: 20px;
  width: 1px; background: var(--border);
}
.tl-item { display: grid; grid-template-columns: 60px 16px 1fr; gap: 0 12px; margin-bottom: 16px; align-items: start; }
.tl-time { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; padding-top: 16px; line-height: 1.4; }
.tl-dot-wrap { display: flex; justify-content: center; padding-top: 18px; position: relative; z-index: 1; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); box-shadow: 0 0 0 1.5px var(--border); }

/* ── ITEM CARD ── */
.item-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: box-shadow 0.15s; }
.item-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
.card-inner { display: flex; }
.card-bar { width: 4px; flex-shrink: 0; }
.card-content { padding: 14px 16px; flex: 1; min-width: 0; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.card-name { font-size: 14px; font-weight: 700; line-height: 1.35; }
.card-nameko { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.card-badge { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.card-meta { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
.card-meta-row { font-size: 11px; color: var(--muted); display: flex; gap: 5px; align-items: flex-start; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.65; font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
.card-who { display: flex; gap: 4px; flex-wrap: wrap; }
.who-tag { font-size: 9px; font-family: var(--mono); padding: 1px 7px; border-radius: 10px; background: rgba(0,0,0,0.05); color: var(--muted); }
.card-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.cbtn {
  font-size: 10px; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border);
  cursor: pointer; background: transparent; color: var(--muted);
  font-family: var(--mono); transition: all 0.12s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
}
.cbtn:hover { background: var(--border); color: var(--ink); }
.cbtn.maps { color: var(--blue); border-color: #c5dff0; }
.cbtn.maps:hover { background: var(--blue-bg); border-color: var(--blue); }
.cbtn.del:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }

/* ── TYPE COLORS ── */
.bar-museum { background: var(--blue); }
.bar-architecture { background: var(--green); }
.bar-restaurant { background: var(--red); }
.bar-other { background: var(--purple); }
.badge-museum { background: var(--blue-bg); color: var(--blue); }
.badge-architecture { background: var(--green-bg); color: var(--green); }
.badge-restaurant { background: var(--red-bg); color: var(--red); }
.badge-other { background: var(--purple-bg); color: var(--purple); }
.dot-museum { background: var(--blue); }
.dot-architecture { background: var(--green); }
.dot-restaurant { background: var(--red); }
.dot-other { background: var(--purple); }

/* ── ADD BUTTON ── */
.add-row { padding-left: 88px; margin: 6px 0 32px; }
.add-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
  background: transparent; border: 1.5px dashed var(--border); border-radius: var(--r);
  cursor: pointer; color: var(--muted); font-family: var(--serif); font-size: 13px; transition: all 0.15s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* ── DAY NOTES ── */
.notes-section { margin-bottom: 40px; }
.notes-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; margin-left: 88px; }
.notes-ta {
  width: 100%; min-height: 72px; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 14px; font-family: var(--serif); font-size: 13px; color: var(--ink);
  resize: vertical; outline: none; transition: border-color 0.15s;
}
.notes-ta:focus { border-color: var(--muted); }

/* ── SIDEBAR ── */
.sb-close-btn { display: none; position: absolute; top: 14px; right: 16px; background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); }
.sb-title { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 20px; }
.sb-day { margin-bottom: 20px; }
.sb-day-title { font-size: 11px; font-weight: 700; padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.sb-day-date { font-family: var(--mono); font-size: 10px; color: var(--muted); font-weight: 400; }
.sb-item { display: flex; gap: 8px; padding: 4px 4px; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
.sb-item:hover { background: rgba(0,0,0,0.04); }
.sb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.sb-info { flex: 1; min-width: 0; }
.sb-name { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-meta { font-size: 10px; font-family: var(--mono); color: var(--muted); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg); border-radius: 12px; padding: 28px;
  width: min(92vw, 500px); max-height: 90vh; overflow-y: auto;
  transform: translateY(16px); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 22px; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 5px; }
.fg input, .fg select, .fg textarea {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 5px; padding: 9px 11px; font-family: var(--serif);
  font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--muted); }
.fg textarea { min-height: 64px; resize: vertical; }
.fg-row { display: flex; gap: 10px; }
.fg-row .fg { flex: 1; }
.who-opts { display: flex; gap: 14px; flex-wrap: wrap; }
.who-opt { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 13px; }
.who-opt input[type="checkbox"] { cursor: pointer; width: auto; accent-color: var(--accent); }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
.btn-cancel { padding: 9px 18px; border: 1px solid var(--border); border-radius: 5px; background: transparent; cursor: pointer; font-family: var(--serif); font-size: 13px; color: var(--muted); }
.btn-cancel:hover { background: var(--border); }
.btn-submit { padding: 9px 22px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-family: var(--serif); font-size: 13px; font-weight: 600; }
.btn-submit:hover { background: #a83520; }

/* ── PRINT FAB ── */
.pfab {
  position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--bg);
  border: none; border-radius: 50px; padding: 12px 22px; cursor: pointer;
  font-family: var(--serif); font-size: 12px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 7px;
  z-index: 50; transition: transform 0.15s;
}
.pfab:hover { transform: translateY(-2px); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 72px; right: 24px; background: var(--ink); color: var(--bg);
  padding: 9px 16px; border-radius: 6px; font-size: 12px; font-family: var(--mono);
  opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── SIDEBAR OVERLAY ── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 140; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .sidebar {
    position: fixed; right: 0; top: 0; bottom: 0; z-index: 150;
    transform: translateX(100%); transition: transform 0.3s ease; height: 100vh;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .sb-close-btn { display: block; }
}
@media (max-width: 600px) {
  .hdr { padding: 10px 14px; }
  .hdr-sub { display: none; }
  .content { padding: 20px 14px; }
  .day-tabs { padding: 0 10px; }
  .tab { padding: 10px 10px; font-size: 11px; }
  .timeline::before { left: 72px; }
  .tl-item { grid-template-columns: 52px 14px 1fr; gap: 0 10px; }
  .add-row { padding-left: 0; }
  .notes-label { margin-left: 0; }
}

/* ── PRINT ── */
@media print {
  .hdr-right, .pfab, .sidebar, .sidebar-overlay, .add-row, .card-btns,
  .modal-overlay, .flight-bar, .toast { display: none !important; }
  .layout { display: block; }
  .content { max-width: 100%; padding: 20px; }
  .item-card { break-inside: avoid; page-break-inside: avoid; margin-bottom: 12px; }
  .hdr { position: relative; background: white !important; color: black !important; print-color-adjust: exact; }
  body { background: white; }
  .day-tabs { position: relative; overflow: visible; }
  .tab { display: none; }
  .tab.active { display: block; border: none; font-size: 14px; font-weight: 700; padding: 12px 0; }
  .day-header h2 { font-size: 18px; }
}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">Seoul D-Hub ✦ 首爾行程</div>
    <div class="hdr-sub">2025 / 7/1–7/5 · 明洞 Stanford Hotel · 3人 inc. 13歲</div>
  </div>
  <div class="hdr-right">
    <button class="hbtn" onclick="toggleFlight()">✈ 機票</button>
    <button class="hbtn" onclick="toggleSidebar()">≡ 總覽</button>
    <button class="hbtn" onclick="exportBackup()">↓ 備份</button>
    <button class="hbtn" onclick="window.print()">⎙ 列印</button>
    <span class="ver">v1.0</span>
  </div>
</header>

<div id="flightBar" class="flight-bar">
  <div class="flight-inner">
    <div class="fld"><label>去程 班號</label><input id="f_out_no" type="text" placeholder="如 CI160"></div>
    <div class="fld"><label>去程 出發</label><input id="f_out_dep" type="text" placeholder="TPE 08:45"></div>
    <div class="fld"><label>去程 抵達</label><input id="f_out_arr" type="text" placeholder="ICN 12:15"></div>
    <div class="fld"><label>回程 班號</label><input id="f_ret_no" type="text" placeholder="如 CI161"></div>
    <div class="fld"><label>回程 出發</label><input id="f_ret_dep" type="text" placeholder="ICN 17:00"></div>
    <div class="fld"><label>回程 抵達</label><input id="f_ret_arr" type="text" placeholder="TPE 18:30"></div>
    <button class="fsave" onclick="saveFlight()">儲存</button>
  </div>
</div>

<nav class="day-tabs" id="dayTabs"></nav>

<div class="layout">
  <main class="content" id="mainContent"></main>
  <aside class="sidebar" id="sidebar">
    <button class="sb-close-btn" onclick="closeSidebar()">✕</button>
    <div class="sb-title">▸ 行程總覽</div>
    <div id="sidebarContent"></div>
  </aside>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">＋ 新增地點</div>
    <div class="fg">
      <label>地點名稱 *</label>
      <input id="m_name" type="text" placeholder="如：弘大逛街、益善洞咖啡">
    </div>
    <div class="fg">
      <label>地點韓文（選填）</label>
      <input id="m_nameko" type="text" placeholder="如：홍대">
    </div>
    <div class="fg-row">
      <div class="fg">
        <label>類型</label>
        <select id="m_type">
          <option value="museum">🔵 美術館／博物館</option>
          <option value="architecture">🟢 建築地標</option>
          <option value="restaurant">🔴 餐廳／咖啡</option>
          <option value="other" selected>🟣 其他</option>
        </select>
      </div>
      <div class="fg">
        <label>加入哪一天</label>
        <select id="m_day">
          <option value="1">Day 1（7/1 三清洞）</option>
          <option value="2">Day 2（7/2 光化門）</option>
          <option value="3">Day 3（7/3 東大門）</option>
          <option value="4">Day 4（7/4 龍山）</option>
          <option value="5">Day 5（7/5 收尾）</option>
        </select>
      </div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>開始時間</label><input id="m_time" type="time" value="10:00"></div>
      <div class="fg"><label>結束時間</label><input id="m_endtime" type="time" value="12:00"></div>
    </div>
    <div class="fg">
      <label>地址／搜尋關鍵字（用於 Google Maps）</label>
      <input id="m_address" type="text" placeholder="如：益善洞 서울 카페">
    </div>
    <div class="fg-row">
      <div class="fg"><label>門票費用</label><input id="m_admission" type="text" placeholder="免費 / ₩15000"></div>
      <div class="fg"><label>營業時間</label><input id="m_hours" type="text" placeholder="10:00–18:00，週一休"></div>
    </div>
    <div class="fg">
      <label>備註說明</label>
      <textarea id="m_desc" placeholder="想法、注意事項、推薦原因..."></textarea>
    </div>
    <div class="fg">
      <label>這是誰想去的？</label>
      <div class="who-opts">
        <label class="who-opt"><input type="checkbox" id="w_mo" checked> Mo</label>
        <label class="who-opt"><input type="checkbox" id="w_wife"> 老婆</label>
        <label class="who-opt"><input type="checkbox" id="w_daughter"> 女兒</label>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitAdd()">加入行程</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>
<button class="pfab" onclick="window.print()">⎙ 列印 / 存 PDF</button>

<script>
// ════════════════════════════════════════════
//  DATA
// ════════════════════════════════════════════

const DAYS_META = [
  { day:1, date:'2025/07/01', weekday:'二', label:'Day 1', area:'三清洞' },
  { day:2, date:'2025/07/02', weekday:'三', label:'Day 2', area:'光化門' },
  { day:3, date:'2025/07/03', weekday:'四', label:'Day 3', area:'東大門' },
  { day:4, date:'2025/07/04', weekday:'五', label:'Day 4', area:'龍山·漢南洞' },
  { day:5, date:'2025/07/05', weekday:'六', label:'Day 5', area:'龍山收尾' },
];

const DEFAULT_ITEMS = {
  1: [
    {
      id:'d1_1', type:'museum',
      name:'國立現代美術館 MMCA Seoul', nameKo:'국립현대미술관',

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════

const STORAGE_KEY = 'seoul_dhub_v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      // ensure all 5 days exist
      for (let d = 1; d <= 5; d++) {
        if (!parsed.items[d]) parsed.items[d] = [];
        if (parsed.notes[d] === undefined) parsed.notes[d] = '';
      }
      return parsed;
    }
  } catch(e) {}
  return {
    flight: { out_no:'', out_dep:'', out_arr:'', ret_no:'', ret_dep:'', ret_arr:'' },
    items: JSON.parse(JSON.stringify(DEFAULT_ITEMS)),
    notes: { 1:'', 2:'', 3:'', 4:'', 5:'' }
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let currentDay = 1;
let noteTimers = {};

// ════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════

function mapsUrl(address) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(address);
}

const TYPE_LABEL = { museum:'美術館', architecture:'建築', restaurant:'餐廳', other:'其他' };

function suggestNextTime(dayNum) {
  const items = state.items[dayNum];
  if (!items || !items.length) return { start:'10:00', end:'12:00' };
  const sorted = [...items].sort((a,b) => a.time.localeCompare(b.time));
  const last = sorted[sorted.length - 1];
  const endStr = last.endTime || last.time;
  const [h, m] = endStr.split(':').map(Number);
  const startMin = h * 60 + m + 30;
  const endMin = startMin + 90;
  const pad = n => String(Math.floor(n)).padStart(2,'0');
  return {
    start: `${pad(startMin/60)}:${pad(startMin%60)}`,
    end:   `${pad(endMin/60)}:${pad(endMin%60)}`
  };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function uid() {
  return 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7);
}

// ════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════

function renderTabs() {
  document.getElementById('dayTabs').innerHTML = DAYS_META.map(d => `
    <button class="tab ${d.day === currentDay ? 'active' : ''}" onclick="switchDay(${d.day})">
      ${d.label} ${d.area}
      <span class="tab-date">${d.date.slice(5)} (${d.weekday})</span>
    </button>
  `).join('');
}

function renderDay() {
  const meta = DAYS_META[currentDay - 1];
  const items = (state.items[currentDay] || []).slice().sort((a,b) => a.time.localeCompare(b.time));
  const note  = state.notes[currentDay] || '';

  const itemsHtml = items.map(item => `
    <div class="tl-item">
      <div class="tl-time">
        ${item.time}${item.endTime ? '<br><span style="opacity:.55">–' + item.endTime + '</span>' : ''}
      </div>
      <div class="tl-dot-wrap"><div class="tl-dot dot-${item.type}"></div></div>
      <div class="item-card">
        <div class="card-inner">
          <div class="card-bar bar-${item.type}"></div>
          <div class="card-content">
            <div class="card-top">
              <div>
                <div class="card-name">${esc(item.name)}</div>
                ${item.nameKo ? `<div class="card-nameko">${esc(item.nameKo)}</div>` : ''}
              </div>
              <span class="card-badge badge-${item.type}">${TYPE_LABEL[item.type]||'其他'}</span>
            </div>
            ${(item.hours || item.admission) ? `
              <div class="card-meta">
                ${item.hours     ? `<div class="card-meta-row"><span>🕐</span><span>${esc(item.hours)}</span></div>` : ''}
                ${item.admission ? `<div class="card-meta-row"><span>🎫</span><span>${esc(item.admission)}</span></div>` : ''}
              </div>` : ''}
            ${item.desc ? `<div class="card-desc">${esc(item.desc)}</div>` : ''}
            <div class="card-footer">
              <div class="card-who">
                ${(item.who||[]).map(w => `<span class="who-tag">${esc(w)}</span>`).join('')}
              </div>
              <div class="card-btns">
                ${item.address ? `<a class="cbtn maps" href="${mapsUrl(item.address)}" target="_blank" rel="noopener">🗺 地圖</a>` : ''}
                <button class="cbtn del" onclick="deleteItem('${item.id}', ${currentDay})">✕ 刪除</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="day-header">
      <h2>${meta.label} — ${meta.area}</h2>
      <div class="day-meta">${meta.date}（${meta.weekday}）· 明洞 Stanford Hotel</div>
    </div>
    <div class="timeline">${itemsHtml || '<p style="padding:16px 0 16px 88px;color:var(--muted);font-size:13px;">這天還沒有地點，點下方新增！</p>'}</div>
    <div class="add-row">
      <button class="add-btn" onclick="openModal(${currentDay})">＋ 新增地點</button>
    </div>
    <div class="notes-section">
      <div class="notes-label">📝 今日備註</div>
      <textarea class="notes-ta" id="noteTa_${currentDay}" placeholder="輸入備註，自動儲存" oninput="noteInput(${currentDay}, this.value)">${esc(note)}</textarea>
    </div>
  `;
}

function renderSidebar() {
  document.getElementById('sidebarContent').innerHTML = DAYS_META.map(meta => {
    const items = (state.items[meta.day]||[]).slice().sort((a,b)=>a.time.localeCompare(b.time));
    return `
      <div class="sb-day">
        <div class="sb-day-title">
          ${meta.label} ${meta.area}
          <span class="sb-day-date">${meta.date.slice(5)}</span>
        </div>
        ${items.length ? items.map(item => `
          <div class="sb-item" onclick="switchDay(${meta.day}); closeSidebar();">
            <div class="sb-dot dot-${item.type}"></div>
            <div class="sb-info">
              <div class="sb-name">${esc(item.name)}</div>
              <div class="sb-meta">${item.time}${item.endTime?' – '+item.endTime:''}${item.admission?' · 🎫'+item.admission:''}</div>
            </div>
          </div>
        `).join('') : '<div style="font-size:11px;color:var(--muted);padding:4px 0 4px 15px;">（尚無地點）</div>'}
      </div>
    `;
  }).join('');
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  renderTabs();
  renderDay();
  renderSidebar();
  syncFlightUI();
}

// ════════════════════════════════════════════
//  INTERACTIONS
// ════════════════════════════════════════════

function switchDay(day) {
  currentDay = day;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleFlight() {
  document.getElementById('flightBar').classList.toggle('open');
}

function syncFlightUI() {
  const f = state.flight;
  document.getElementById('f_out_no').value  = f.out_no  || '';
  document.getElementById('f_out_dep').value = f.out_dep || '';
  document.getElementById('f_out_arr').value = f.out_arr || '';
  document.getElementById('f_ret_no').value  = f.ret_no  || '';
  document.getElementById('f_ret_dep').value = f.ret_dep || '';
  document.getElementById('f_ret_arr').value = f.ret_arr || '';
}

function saveFlight() {
  state.flight = {
    out_no:  document.getElementById('f_out_no').value.trim(),
    out_dep: document.getElementById('f_out_dep').value.trim(),
    out_arr: document.getElementById('f_out_arr').value.trim(),
    ret_no:  document.getElementById('f_ret_no').value.trim(),
    ret_dep: document.getElementById('f_ret_dep').value.trim(),
    ret_arr: document.getElementById('f_ret_arr').value.trim(),
  };
  saveState();
  showToast('✈ 機票資訊已儲存');
  document.getElementById('flightBar').classList.remove('open');
}

function noteInput(day, val) {
  clearTimeout(noteTimers[day]);
  noteTimers[day] = setTimeout(() => {
    state.notes[day] = val;
    saveState();
    showToast('備註已自動儲存');
  }, 900);
}

function deleteItem(id, dayNum) {
  if (!confirm('確定刪除這個地點？')) return;
  state.items[dayNum] = (state.items[dayNum] || []).filter(i => i.id !== id);
  saveState();
  render();
  showToast('已刪除');
}

// ════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════

function openModal(day) {
  document.getElementById('m_day').value = String(day);
  const { start, end } = suggestNextTime(day);
  document.getElementById('m_time').value    = start;
  document.getElementById('m_endtime').value = end;
  ['m_name','m_nameko','m_address','m_admission','m_hours','m_desc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('m_type').value = 'other';
  document.getElementById('w_mo').checked       = false;
  document.getElementById('w_wife').checked     = false;
  document.getElementById('w_daughter').checked = false;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('m_name').focus(), 200);
}

function handleOverlayClick(e) {
  if (e.target === e.currentTarget) closeModal();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function submitAdd() {
  const name = document.getElementById('m_name').value.trim();
  if (!name) { document.getElementById('m_name').focus(); return; }
  const dayNum = parseInt(document.getElementById('m_day').value, 10);
  const who = [];
  if (document.getElementById('w_mo').checked)       who.push('Mo');
  if (document.getElementById('w_wife').checked)     who.push('老婆');
  if (document.getElementById('w_daughter').checked) who.push('女兒');
  const item = {
    id:        uid(),
    type:      document.getElementById('m_type').value,
    name,
    nameKo:    document.getElementById('m_nameko').value.trim(),
    time:      document.getElementById('m_time').value    || '12:00',
    endTime:   document.getElementById('m_endtime').value || '',
    hours:     document.getElementById('m_hours').value.trim(),
    admission: document.getElementById('m_admission').value.trim(),
    desc:      document.getElementById('m_desc').value.trim(),
    address:   document.getElementById('m_address').value.trim(),
    who,
    isDefault: false,
  };
  if (!state.items[dayNum]) state.items[dayNum] = [];
  state.items[dayNum].push(item);
  saveState();
  currentDay = dayNum;
  closeModal();
  render();
  showToast('✅ 已加入 Day ' + dayNum);
}

  document.getElementById('sidebar').classList.toggle('open');

//  EXPORT BACKUP
// ════════════════════════════════════════════

function exportBackup() {
  const payload = {
    exported: new Date().toISOString(),
    trip: 'Seoul 2025 — 7/1–7/5',
    members: ['Mo', '老婆', '女兒'],
    state
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `seoul-dhub-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('↓ 備份已下載');
}

// ════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════

document.addEventListener('keydown', e => {
  const active = document.activeElement.tagName;
  if (e.key === 'Escape') closeModal();
  if (['INPUT','TEXTAREA','SELECT'].includes(active)) return;
  if (e.key === 'ArrowRight' && currentDay < 5) switchDay(currentDay + 1);
  if (e.key === 'ArrowLeft'  && currentDay > 1) switchDay(currentDay - 1);
});
