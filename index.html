<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seoul D-Hub — 首爾行程 2025</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase compat SDK (no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
:root {
  --bg:#F3EEE5; --card:#FAF7F1; --ink:#2A2018; --muted:#786A58; --border:#D8D0C4;
  --accent:#B85A38; --accent-bg:#FBF0EC;
  --blue:#4A6882; --blue-bg:#EBF0F5;
  --green:#557852; --green-bg:#EDF4EB;
  --red:#B85A38; --red-bg:#FBF0EC;
  --purple:#7B5A82; --purple-bg:#F5F0F7;
  --serif:'Noto Serif TC',Georgia,serif;
  --mono:'DM Mono',Consolas,monospace;
  --r:10px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:var(--serif);min-height:100vh;font-size:14px;line-height:1.6}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:100;background:#2A2018;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:11px 20px;gap:12px;border-bottom:1px solid rgba(184,90,56,.35)}
.hdr-title{font-size:15px;font-weight:700;letter-spacing:.05em;color:#F0E8D8}
.hdr-sub{font-size:10px;font-family:var(--mono);opacity:.38;margin-top:1px;color:#F0E8D8}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;max-width:calc(100vw - 160px)}
.hbtn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(240,232,216,.85);padding:5px 11px;border-radius:5px;cursor:pointer;font-size:11px;font-family:var(--mono);transition:all .15s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.26)}
.hbtn.mob-hide{display:inline-flex}
.ver{font-family:var(--mono);font-size:10px;opacity:.22;margin-left:4px;color:#F0E8D8}

/* user selector */
.user-sel{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:rgba(255,255,255,.95);padding:5px 9px;border-radius:5px;font-family:var(--mono);font-size:11px;cursor:pointer;outline:none}
.user-sel option{background:#1C1A17;color:#F5F2EC}
.user-sel.selected-mo    {border-color:#7a7068;background:rgba(122,112,104,.35)}
.user-sel.selected-kelly {border-color:#d48aaa;background:rgba(212,138,170,.25)}
.user-sel.selected-mia   {border-color:#9985cc;background:rgba(153,133,204,.25)}
.user-sel.selected-rui   {border-color:#6a9fd4;background:rgba(106,159,212,.25)}

/* connection dot */
.conn-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;transition:background .3s}
.conn-dot.connected{background:#4CAF50;box-shadow:0 0 5px #4CAF50}
.conn-dot.offline{background:#666}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.conn-dot.syncing{background:#FF9800;animation:blink .8s infinite}

/* ── PANELS ── */
.panel{overflow:hidden;max-height:0;transition:max-height .35s ease;border-bottom:1px solid var(--border)}
.panel.open{max-height:260px}
.panel-flight{background:#fdf5ed}
.panel-hotel{background:#edf5fd}
.panel-emergency{background:#fdf0ed}
.panel-inner{padding:16px 22px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.fld input,.fld textarea{background:white;border:1px solid var(--border);border-radius:5px;padding:6px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);outline:none}
.fld input{width:148px}
.fld input:focus,.fld textarea:focus{border-color:var(--accent)}
.fld textarea{width:220px;min-height:52px;resize:none;font-size:11px}
.psave{background:var(--accent);color:white;border:none;border-radius:5px;padding:7px 16px;cursor:pointer;font-size:13px;font-family:var(--serif);align-self:flex-end}
.psave:hover{background:#a83520}

/* ── WEATHER ── */
.weather-banner{background:#fff8e6;border-bottom:1px solid #f0d98a;padding:9px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:12px;color:#7a5c00}
.weather-dismiss{background:none;border:none;cursor:pointer;font-size:16px;opacity:.5;flex-shrink:0}
.weather-dismiss:hover{opacity:1}

/* ── DAY TABS ── */
.day-tabs{background:#2A2018;border-bottom:1px solid rgba(184,90,56,.2);display:flex;overflow-x:auto;padding:0 14px;scrollbar-width:none}
.day-tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;cursor:pointer;font-size:12px;font-weight:600;color:rgba(240,232,216,.38);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:var(--serif);transition:all .15s}
.tab:hover{color:rgba(240,232,216,.75)}
.tab.active{color:#F0E8D8;border-bottom-color:var(--accent)}
.tab-date{display:block;font-size:9px;font-family:var(--mono);opacity:.5;font-weight:400;margin-top:1px}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 92px)}
.content{flex:1;padding:26px 26px;max-width:740px;min-width:0}
.sidebar{width:296px;flex-shrink:0;background:var(--card);border-left:1px solid var(--border);padding:22px 17px 22px 18px;position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto}

/* ── DAY HEADER ── */
.day-header{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.day-header h2{font-size:21px;font-weight:700}
.day-meta{font-size:11px;font-family:var(--mono);color:var(--muted);margin-top:3px}
.show-hidden-btn{font-size:11px;font-family:var(--mono);padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--muted);white-space:nowrap;align-self:flex-start;margin-top:4px}
.show-hidden-btn:hover{background:var(--border);color:var(--ink)}
.show-hidden-btn.active{background:#fef9e5;border-color:#d4a800;color:#8a6c00}

/* ── TIMELINE ── */
.timeline{position:relative}
.timeline::before{content:'';position:absolute;left:79px;top:12px;bottom:20px;width:1px;background:var(--border)}
.tl-item{display:grid;grid-template-columns:60px 16px 1fr;gap:0 12px;margin-bottom:14px;align-items:start}
.tl-time{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:right;padding-top:16px;line-height:1.4}
.tl-dot-wrap{display:flex;justify-content:center;padding-top:18px;position:relative;z-index:1}
.tl-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 0 1.5px var(--border)}

/* ── ITEM CARD ── */
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:box-shadow .15s,opacity .2s;box-shadow:0 2px 8px rgba(14,12,38,.06)}
.item-card:hover{box-shadow:0 4px 20px rgba(14,12,38,.13)}
.item-card.hidden-item{opacity:.4}
.card-inner{display:flex}
.card-bar{width:4px;flex-shrink:0}
.card-content{padding:13px 15px;flex:1;min-width:0}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.card-name{font-size:14px;font-weight:700;line-height:1.35}
.card-nameko{font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:2px}
.card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.card-badge{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.hidden-label{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;background:#fef9e5;color:#8a6c00;border:1px solid #d4a800;white-space:nowrap}
.resv-badge{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:opacity .15s}
.resv-badge:hover{opacity:.7}
.resv-none{background:#f0eeea;color:var(--muted);border-color:var(--border)}
.resv-pending{background:#fff4e0;color:#8a5c00;border-color:#e8c56a}
.resv-booked{background:#e5f5eb;color:#2a6e42;border-color:#7ec89a}
.card-meta{display:flex;flex-direction:column;gap:3px;margin-top:7px}
.card-meta-row{font-size:11px;color:var(--muted);display:flex;gap:5px;align-items:flex-start}
.card-desc{font-size:12px;color:var(--muted);line-height:1.65;font-style:italic;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}

/* ── VOTES ── */
.vote-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;padding-top:9px;border-top:1px solid var(--border)}
.vote-btn{font-size:10px;font-family:var(--mono);padding:3px 8px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;background:transparent;display:inline-flex;align-items:center;gap:3px;color:var(--muted);transition:all .12s}
.vote-btn:hover{border-color:var(--muted)}
.vote-btn.me{border-style:solid;font-weight:700}
.vote-v1{background:#e8f4ee;border-color:#7ec89a;color:#2a6e42}
.vote-v2{background:#fde8f2;border-color:#d48aaa;color:#8a2f5a}
.vote-v3{background:#fef9e5;border-color:#d4a800;color:#8a6c00}

/* ── FOOTER ── */
.card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:6px}
.card-who{display:flex;gap:4px;flex-wrap:wrap}
.who-tag{font-size:9px;font-family:var(--mono);padding:2px 8px;border-radius:10px}
.who-mo{background:#E8D8A8;color:#5A3E10}
.who-kelly{background:#F2D8D0;color:#7A3020}
.who-mia{background:#D5E8CC;color:#3A5828}
.who-rui{background:#C8DCEA;color:#2A4A60}
.who-other{background:rgba(0,0,0,.06);color:var(--muted)}
.card-btns{display:flex;gap:6px;flex-wrap:wrap}
.cbtn{font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--muted);font-family:var(--mono);text-decoration:none;display:inline-flex;align-items:center;gap:3px;transition:all .12s}
.cbtn:hover{background:var(--border);color:var(--ink)}
.cbtn.maps{color:var(--blue);border-color:#c5dff0}
.cbtn.maps:hover{background:var(--blue-bg);border-color:var(--blue)}
.cbtn.hide:hover{color:#8a6c00;border-color:#d4a800;background:#fef9e5}
.cbtn.restore{color:var(--green);border-color:#a5d4b5}
.cbtn.restore:hover{background:var(--green-bg)}

/* ── TYPE ── */
.bar-museum{background:var(--blue)}.bar-architecture{background:var(--green)}.bar-restaurant{background:var(--red)}.bar-other{background:var(--purple)}
.badge-museum{background:var(--blue-bg);color:var(--blue)}.badge-architecture{background:var(--green-bg);color:var(--green)}.badge-restaurant{background:var(--red-bg);color:var(--red)}.badge-other{background:var(--purple-bg);color:var(--purple)}
.dot-museum{background:var(--blue)}.dot-architecture{background:var(--green)}.dot-restaurant{background:var(--red)}.dot-other{background:var(--purple)}.dot-hidden{background:#ccc}

/* ── ADD ── */
.add-row{padding-left:88px;margin:4px 0 26px}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:transparent;border:1.5px dashed var(--border);border-radius:var(--r);cursor:pointer;color:var(--muted);font-family:var(--serif);font-size:13px;transition:all .15s}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}

/* ── NOTES ── */
.notes-section{margin-bottom:36px}
.notes-label{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px;margin-left:88px}
.notes-ta{width:100%;min-height:68px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:11px 13px;font-family:var(--serif);font-size:13px;color:var(--ink);resize:vertical;outline:none;transition:border-color .15s}
.notes-ta:focus{border-color:var(--muted)}

/* ── SIDEBAR ── */
.sb-close-btn{display:none;position:absolute;top:14px;right:16px;background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted)}
.sb-title{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px}
.sb-section{border:1px solid #c5dff0;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:11px}
.sb-section.hotel{background:var(--blue-bg)}
.sb-section.emergency{background:var(--red-bg);border-color:#e8b0a0}
.sb-section-title{font-weight:700;font-size:12px;margin-bottom:4px}
.sb-section-meta{font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.9}
.sb-section.emergency .sb-section-meta{color:#7a3020}
.sb-section-link{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--blue);text-decoration:none;margin-top:4px}
.sb-day{margin-bottom:16px}
.sb-day-title{font-size:11px;font-weight:700;padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sb-day-date{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:400}
.sb-item{display:flex;gap:7px;padding:4px;border-radius:4px;cursor:pointer;transition:background .1s}
.sb-item:hover{background:rgba(0,0,0,.04)}
.sb-item.is-hidden{opacity:.4}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.sb-info{flex:1;min-width:0}
.sb-name{font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-meta{font-size:10px;font-family:var(--mono);color:var(--muted)}
.sb-votes{font-size:10px;font-family:var(--mono);color:var(--muted)}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:12px;padding:26px;width:min(92vw,520px);max-height:90vh;overflow-y:auto;transform:translateY(16px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:18px}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:8px 11px;font-family:var(--serif);font-size:13px;color:var(--ink);outline:none;transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--muted)}
.fg textarea{min-height:58px;resize:vertical}
.fg-row{display:flex;gap:10px}.fg-row .fg{flex:1}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.member-opt{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;transition:all .15s;font-size:13px;user-select:none}
.member-opt input{display:none}
.member-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.md-mo{background:#3a3630}.md-kelly{background:#8a2f5a}.md-mia{background:#5e45a0}.md-rui{background:#2d5f9b}
.checked-mo{border-color:#aaa298;background:#f0ede8}
.checked-kelly{border-color:#d48aaa;background:#fde8f2}
.checked-mia{border-color:#9985cc;background:#ede8f9}
.checked-rui{border-color:#6a9fd4;background:#e5f0fb}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.btn-cancel{padding:9px 18px;border:1px solid var(--border);border-radius:5px;background:transparent;cursor:pointer;font-family:var(--serif);font-size:13px;color:var(--muted)}
.btn-cancel:hover{background:var(--border)}
.btn-submit{padding:9px 22px;background:var(--accent);color:white;border:none;border-radius:5px;cursor:pointer;font-family:var(--serif);font-size:13px;font-weight:600}
.btn-submit:hover{background:#a83520}

/* ── FAB ── */
.pfab{position:fixed;bottom:24px;right:24px;background:var(--ink);color:var(--bg);border:none;border-radius:50px;padding:12px 22px;cursor:pointer;font-family:var(--serif);font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.18);display:flex;align-items:center;gap:7px;z-index:50;transition:transform .15s}
.pfab:hover{transform:translateY(-2px)}

/* ── LOGIN OVERLAY ── */
.login-overlay{position:fixed;inset:0;background:#1E1810;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px}
.login-overlay.hidden{display:none}
.login-logo{font-size:48px;line-height:1}
.login-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:.04em}
.login-sub{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.35);margin-top:-18px;letter-spacing:.1em}
.login-prompt{font-size:13px;color:rgba(255,255,255,.6)}
.login-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:min(90vw,320px)}
.login-btn{padding:18px 14px;border:none;border-radius:10px;cursor:pointer;font-family:var(--serif);font-size:15px;font-weight:700;transition:transform .12s,box-shadow .12s;display:flex;flex-direction:column;align-items:center;gap:4px}
.login-btn .lb-emoji{font-size:24px;line-height:1}
.login-btn .lb-role{font-size:9px;font-family:var(--mono);opacity:.65;font-weight:400;letter-spacing:.05em}
.login-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.5)}
.login-btn:active{transform:none}
.lbtn-mo   {background:#8B6820;color:#FFF0C8}
.lbtn-kelly{background:#8B3828;color:#FFE8E0}
.lbtn-mia  {background:#486840;color:#E8F5E0}
.lbtn-rui  {background:#2C5070;color:#DCF0FF}

/* ── GUIDE PAGE (step 2, same overlay) ── */
.guide-page{display:none;flex-direction:column;align-items:center;gap:22px;width:min(92vw,360px)}
.guide-page.active{display:flex}
.guide-who{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.guide-who-badge{font-size:13px;font-family:var(--mono);padding:3px 12px;border-radius:20px;font-weight:700}
.guide-card{background:#161616;border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:22px 24px;width:100%}
.guide-card-title{font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.guide-items{display:flex;flex-direction:column;gap:14px}
.guide-item{display:flex;align-items:flex-start;gap:12px}
.guide-icon{font-size:20px;line-height:1;flex-shrink:0;margin-top:1px}
.guide-text{flex:1}
.guide-text strong{display:block;font-size:13px;color:#fff;font-weight:700;margin-bottom:2px}
.guide-text span{font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.45);letter-spacing:.03em}
.guide-enter{width:100%;padding:14px;border:none;border-radius:10px;background:#B85A38;color:#fff;font-family:var(--serif);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .15s}
.guide-enter:hover{opacity:.88}
.guide-back{background:none;border:none;cursor:pointer;font-size:11px;font-family:var(--mono);color:rgba(255,255,255,.3);padding:4px;letter-spacing:.06em;transition:color .15s}
.guide-back:hover{color:rgba(255,255,255,.6)}
.login-page{display:flex;flex-direction:column;align-items:center;gap:28px}
.login-page.hidden{display:none}

/* user chip in header */
.user-chip{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.18);cursor:pointer;font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.85);background:rgba(255,255,255,.07);transition:all .15s;white-space:nowrap}
.user-chip:hover{background:rgba(255,255,255,.15)}
.chip-mo   {border-color:#8B6820!important;background:rgba(139,104,32,.2)!important;color:#D4A840!important}
.chip-kelly{border-color:#8B3828!important;background:rgba(139,56,40,.2)!important;color:#D47060!important}
.chip-mia  {border-color:#486840!important;background:rgba(72,104,64,.2)!important;color:#80A870!important}
.chip-rui  {border-color:#2C5070!important;background:rgba(44,80,112,.2)!important;color:#6090B8!important}
.chip-switch{opacity:.35;font-size:9px;margin-left:2px}

/* ── DAY SUGGEST (modal) ── */
.day-suggest{background:var(--blue-bg);border:1px solid #b8ceff;border-radius:7px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
.day-suggest.hidden{display:none}
.day-suggest-text{font-size:11px;font-family:var(--mono);color:var(--blue);flex:1}
.day-suggest-text strong{font-weight:700}
.day-suggest-apply{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:4px 11px;font-size:10px;font-family:var(--mono);cursor:pointer;white-space:nowrap}
.day-suggest-apply:hover{opacity:.85}

/* ── MOVE SHEET ── */
.move-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:210;display:none;align-items:flex-end;justify-content:center}
.move-modal.open{display:flex}
.move-sheet{background:var(--card);border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%;max-width:500px}
.move-sheet-title{font-size:13px;font-weight:700;margin-bottom:3px}
.move-sheet-name{font-size:11px;font-family:var(--mono);color:var(--muted);margin-bottom:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.move-day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:12px}
.move-day-btn{padding:10px 4px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--muted);text-align:center;line-height:1.5;transition:all .12s}
.move-day-btn span{display:block;font-size:9px;font-weight:400;opacity:.6}
.move-day-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.move-day-btn.suggested{border-color:var(--blue);color:var(--blue);background:var(--blue-bg)}
.move-day-btn.current{opacity:.3;cursor:default;pointer-events:none;border-style:dashed}
.move-suggest-label{font-size:10px;font-family:var(--mono);color:var(--blue);margin-bottom:10px}
.move-suggest-label.hidden{display:none}
.move-cancel{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:transparent;cursor:pointer;font-family:var(--serif);font-size:13px;color:var(--muted)}
.move-cancel:hover{background:var(--border)}

/* ── TOAST ── */
.toast{position:fixed;bottom:72px;right:24px;background:var(--ink);color:var(--bg);padding:9px 16px;border-radius:6px;font-size:12px;font-family:var(--mono);opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none;z-index:300}
.toast.show{opacity:1;transform:translateY(0)}

/* ── SYNC INFO ── */
.sync-bar{background:rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.08);padding:4px 20px;font-size:10px;font-family:var(--mono);color:rgba(255,255,255,.45);display:flex;align-items:center;gap:6px}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{position:fixed;right:0;top:0;bottom:0;z-index:150;transform:translateX(100%);transition:transform .3s ease;height:100vh}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.open{display:block}
  .sb-close-btn{display:block}
}
@media(max-width:640px){
  /* Header */
  .hdr{padding:9px 12px}
  .hdr-sub{display:none}
  .hbtn.mob-hide{display:none}
  .hdr-right{max-width:calc(100vw - 140px)}

  /* Content */
  .content{padding:14px 12px}
  .day-tabs{padding:0 8px}
  .tab{padding:10px 10px;font-size:11px}

  /* Timeline — narrower time column */
  .timeline::before{left:56px}
  .tl-item{grid-template-columns:42px 12px 1fr;gap:0 8px}
  .tl-time{font-size:10px;padding-top:14px}

  /* Card — bigger touch targets */
  .card-content{padding:12px 13px}
  .cbtn{padding:7px 11px;font-size:11px}
  .vote-btn{padding:6px 10px;font-size:11px}
  .card-footer{gap:8px}
  .card-btns{gap:7px}

  /* Notes */
  .add-row{padding-left:0}
  .notes-label{margin-left:0}

  /* Move sheet full width on mobile */
  .move-sheet{border-radius:16px 16px 0 0;padding:18px 16px 40px}
  .move-day-btn{padding:12px 4px;font-size:10px}
}
@media print{
  .hdr-right,.pfab,.sidebar,.sidebar-overlay,.add-row,.card-btns,
  .modal-overlay,.panel,.toast,.show-hidden-btn,.weather-banner,.vote-row,.sync-bar{display:none!important}
  .layout{display:block}
  .content{max-width:100%;padding:20px}
  .item-card{break-inside:avoid;page-break-inside:avoid;margin-bottom:12px}
  .item-card.hidden-item{display:none}
  .hdr{position:relative;background:white!important;color:black!important}
  body{background:white}
  .tab{display:none}
  .tab.active{display:block;border:none;font-size:14px;font-weight:700;padding:12px 0}
}
</style>

const LOCAL_KEY = 'seoul_dhub_v3';

function freshState() {
  return {
    flight:    {out_no:'',out_dep:'',out_arr:'',ret_no:'',ret_dep:'',ret_arr:''},
    hotel:     {...DEFAULT_HOTEL},
    emergency: {...DEFAULT_EMERGENCY},
    items:     JSON.parse(JSON.stringify(DEFAULT_ITEMS)),
    notes:     {1:'',2:'',3:'',4:'',5:''},
  };
}

function migrateItem(i) {
  if (!i.hidden    && i.hidden    !== false) i.hidden    = false;
  if (!i.resv)                               i.resv      = 'none';
  if (!i.votes)                              i.votes     = EMPTY_VOTES();
  if (i.budget    === undefined)             i.budget    = '';
  if (i.transport === undefined)             i.transport = '';
  return i;
}

function migrateState(s) {
  if (!s.hotel)     s.hotel     = {...DEFAULT_HOTEL};
  if (!s.emergency) s.emergency = {...DEFAULT_EMERGENCY};
  for (let d=1;d<=5;d++) {
    if (!s.items[d])  s.items[d]  = [];
    if (s.notes[d] === undefined) s.notes[d] = '';
    s.items[d].forEach(migrateItem);
  }
  return s;
}

function loadLocal() {
  try {
    const s = localStorage.getItem(LOCAL_KEY);
    return s ? migrateState(JSON.parse(s)) : null;
  } catch(e) { return null; }
}

function saveLocal() {
  localStorage.setItem(LOCAL_KEY, JSON.stringify(state));
}

//  FIREBASE SYNC
// ═══════════════════════════════════════════

// Connection status
db.ref('.info/connected').on('value', snap => {
  const ok = snap.val();
  setConnUI(ok ? 'connected' : 'offline');
  setSyncInfo(ok ? '已連線，即時同步中' : '離線模式');
});

// Initial load from Firebase
db.ref(DB_PATH).once('value').then(snap => {
  const fbData = snap.val();
  if (fbData && fbData.items) {
    state = migrateState(fbData);
    saveLocal();
  } else {
    // First time: seed Firebase with defaults
    const seed = freshState();
    db.ref(DB_PATH).set(seed);
    state = seed;
  }
  fbReady = true;
  render();
}).catch(() => {
  fbReady = true;
  render(); // offline fallback
});

// Real-time listener
db.ref(DB_PATH).on('value', snap => {
  if (!fbReady) return;
  const fbData = snap.val();
  if (!fbData) return;
  if (fbData._wid === localWriteId) return; // echo of own write
  state = migrateState(fbData);
  saveLocal();
  render();
  const who = fbData._by ? fbData._by + ' 更新了行程' : '行程已同步';
  showToast('🔄 ' + who);
});

function saveState() {
  localWriteId = uid();
  state._wid = localWriteId;
  state._by  = currentUser || '—';
  state._ts  = Date.now();
  saveLocal();
  if (fbReady) {
    setConnUI('syncing');
    db.ref(DB_PATH).set(state)
      .then(()  => setConnUI('connected'))
      .catch(()  => { setConnUI('offline'); showToast('⚠️ 同步失敗，已存本機'); });
  }
}

function setConnUI(status) {
  ['connDot','connDot2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.className = 'conn-dot ' + status;
  });
}

function setSyncInfo(msg) {
  const el = document.getElementById('syncInfo');
  if (el) el.textContent = msg;
}

function mapsUrl(a) { return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(a); }
function whoClass(n) { return ({Mo:'who-mo',Kelly:'who-kelly',Mia:'who-mia',Rui:'who-rui'})[n]||'who-other'; }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return 'u_'+Date.now()+'_'+Math.random().toString(36).slice(2,7); }

function suggestNextTime(d) {
  const vis = (state.items[d]||[]).filter(i=>!i.hidden);
  if (!vis.length) return {start:'10:00',end:'12:00'};
  const last = [...vis].sort((a,b)=>a.time.localeCompare(b.time)).pop();
  const [h,m] = (last.endTime||last.time).split(':').map(Number);
  const s=h*60+m+30, e=s+90;
  const p=n=>String(Math.floor(n)).padStart(2,'0');
  return {start:`${p(s/60)}:${p(s%60)}`,end:`${p(e/60)}:${p(e%60)}`};
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

function voteStr(votes) {
  if (!votes) return '';
  return Object.entries(votes).filter(([,v])=>v>0).map(([k,v])=>`${k}${VOTE_ICONS[v]}`).join(' ');
}

function switchDay(d) { currentDay=d; render(); window.scrollTo({top:0,behavior:'smooth'}); }
function toggleShowHidden(d) { showHidden[d]=!showHidden[d]; renderDay(); }

function toggleHide(id, d) {
  const item=(state.items[d]||[]).find(i=>i.id===id); if(!item) return;
  item.hidden=!item.hidden; saveState(); render();
  showToast(item.hidden?'🙈 已隱藏':'↩ 已恢復');
}

function cycleResv(id, d) {
  const item=(state.items[d]||[]).find(i=>i.id===id); if(!item) return;
  item.resv=RESV_CYCLE[(RESV_CYCLE.indexOf(item.resv||'none')+1)%3];
  saveState(); render(); showToast('預約：'+RESV_LABEL[item.resv]);
}

function cycleVote(id, d, name) {
  const item=(state.items[d]||[]).find(i=>i.id===id); if(!item) return;
  if(!item.votes) item.votes=EMPTY_VOTES();
  item.votes[name]=(item.votes[name]+1)%4;
  saveState(); render();
}

function noteInput(d, val) {
  clearTimeout(noteTimers[d]);
  noteTimers[d]=setTimeout(()=>{ state.notes[d]=val; saveState(); showToast('備註已儲存'); },1000);
}

function dismissWeather() {
  weatherDismissed=true;
  localStorage.setItem('seoul_weather_dismissed','1');
  document.getElementById('weatherBanner').style.display='none';
}

// ── PANELS ──
function togglePanel(id) {
  const el=document.getElementById(id), was=el.classList.contains('open');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  if(!was) el.classList.add('open');
}

function syncPanelUI() {
  const f=state.flight||{}, h=state.hotel||{}, e=state.emergency||{};
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v||'';};
  set('f_out_no',f.out_no);set('f_out_dep',f.out_dep);set('f_out_arr',f.out_arr);
  set('f_ret_no',f.ret_no);set('f_ret_dep',f.ret_dep);set('f_ret_arr',f.ret_arr);
  set('h_name',h.name);set('h_address',h.address);set('h_cin',h.cin);
  set('h_cout',h.cout);set('h_conf',h.conf);set('h_phone',h.phone);set('h_notes',h.notes);
  set('e_police',e.police);set('e_ambulance',e.ambulance);
  set('e_hotel_kr',e.hotel_kr);set('e_hospital',e.hospital);
  set('e_insurance',e.insurance);set('e_notes',e.notes);
}

function saveFlight() {
  const g=id=>document.getElementById(id).value.trim();
  state.flight={out_no:g('f_out_no'),out_dep:g('f_out_dep'),out_arr:g('f_out_arr'),
                ret_no:g('f_ret_no'),ret_dep:g('f_ret_dep'),ret_arr:g('f_ret_arr')};
  saveState(); showToast('✈ 機票已儲存');
  document.getElementById('panelFlight').classList.remove('open');
}

function saveHotel() {
  const g=id=>document.getElementById(id).value.trim();
  state.hotel={name:g('h_name'),address:g('h_address'),cin:g('h_cin'),
               cout:g('h_cout'),conf:g('h_conf'),phone:g('h_phone'),notes:g('h_notes')};
  saveState(); showToast('🏨 住宿已儲存'); render();
  document.getElementById('panelHotel').classList.remove('open');
}

function saveEmergency() {
  const g=id=>document.getElementById(id).value.trim();
  state.emergency={police:g('e_police'),ambulance:g('e_ambulance'),hotel_kr:g('e_hotel_kr'),
                   hospital:g('e_hospital'),insurance:g('e_insurance'),notes:g('e_notes')};
  saveState(); showToast('🆘 緊急資訊已儲存'); render();

  document.getElementById('sidebarOverlay').classList.toggle('open');

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════

function toggleMember(name) {
  const cb=document.getElementById('w_'+name), opt=document.getElementById('opt_'+name);
  cb.checked=!cb.checked;
  const m=MEMBERS.find(m=>m.low===name);
  if(m) opt.classList.toggle(m.optCls,cb.checked);
}

function openModal(day) {
  document.getElementById('m_day').value=String(day);
  const {start,end}=suggestNextTime(day);
  document.getElementById('m_time').value=start;
  document.getElementById('m_endtime').value=end;
  ['m_name','m_nameko','m_address','m_admission','m_budget','m_hours','m_transport','m_desc']
    .forEach(id=>{document.getElementById(id).value='';});
  document.getElementById('m_type').value='other';
  suggestedDay=null; document.getElementById('daySuggestBanner').classList.add('hidden');
  MEMBERS.forEach(m=>{
    document.getElementById('w_'+m.low).checked=false;
    document.getElementById('opt_'+m.low).classList.remove(m.optCls);
  });
  // auto-check current user
  if (currentUser) {
    const m=MEMBERS.find(m=>m.id===currentUser);
    if(m) toggleMember(m.low);
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('m_name').focus(),200);
}

function handleOverlayClick(e) { if(e.target===e.currentTarget) closeModal(); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function submitAdd() {
  const name=document.getElementById('m_name').value.trim();
  if(!name){document.getElementById('m_name').focus();return;}
  const g=id=>document.getElementById(id).value.trim();
  const dayNum=parseInt(g('m_day'),10);
  const who=MEMBERS.filter(m=>document.getElementById('w_'+m.low).checked).map(m=>m.id);
  const item={
    id:uid(),type:g('m_type'),hidden:false,resv:'none',votes:EMPTY_VOTES(),
    name,nameKo:g('m_nameko'),
    time:g('m_time')||'12:00',endTime:g('m_endtime'),
    hours:g('m_hours'),admission:g('m_admission'),
    budget:g('m_budget'),transport:g('m_transport'),
    desc:g('m_desc'),address:g('m_address'),
    who,isDefault:false,addedBy:currentUser||'—',
  };
  if(!state.items[dayNum]) state.items[dayNum]=[];
  state.items[dayNum].push(item);
  saveState(); currentDay=dayNum; closeModal(); render();
  showToast('✅ 已加入 Day '+dayNum);
}

// ═══════════════════════════════════════════
//  SMART DAY SUGGESTION
// ═══════════════════════════════════════════

const DAY_KEYWORDS = {
  1: ['삼청','경복','북촌','인사동','안국','창덕','가회','소격','팔판','삼청동'],
  2: ['광화문','세종대로','청계천','을지로','명동','시청','남대문','중구','덕수궁','일민','세종'],
  3: ['동대문','ddp','동대문디자인','성수','왕십리','동묘','신당','을지로3가','을지로4가'],
  4: ['용산','한남','이태원','압구정','강남','신사','청담','도산','한강진','리움','소서울','한남동'],
  5: ['이촌','국립중앙박물관','서빙고','노량진','용산역'],
};

let suggestedDay = null;

function suggestBestDay(name, address) {
  const txt = ((name||'') + ' ' + (address||'')).toLowerCase();
  const scores = {};
  for (let d = 1; d <= 5; d++) {
    scores[d] = (DAY_KEYWORDS[d]||[]).reduce((s,kw) => txt.includes(kw) ? s+3 : s, 0);
    const cnt = (state.items[d]||[]).filter(i=>!i.hidden).length;
    if (cnt < 3) scores[d] += 1;
  }
  const best = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  return parseInt(best[1]) >= 3 ? {day:parseInt(best[0]), score:parseInt(best[1])} : null;
}

function updateDaySuggest() {
  const name = document.getElementById('m_name').value;
  const addr = document.getElementById('m_address').value;
  const result = suggestBestDay(name, addr);
  const banner = document.getElementById('daySuggestBanner');
  const text   = document.getElementById('daySuggestText');
  if (result) {
    suggestedDay = result.day;
    const meta = DAYS_META[result.day-1];
    text.innerHTML = `📍 建議 <strong>Day ${result.day} — ${meta.area}</strong>（依地理位置）`;
    banner.classList.remove('hidden');
  } else {
    suggestedDay = null;
    banner.classList.add('hidden');
  }
}

function applySuggest() {
  if (!suggestedDay) return;
  document.getElementById('m_day').value = String(suggestedDay);
  document.getElementById('daySuggestBanner').classList.add('hidden');
  showToast(`✓ 已設為 Day ${suggestedDay}`);
}

// ═══════════════════════════════════════════
//  MOVE ITEM
// ═══════════════════════════════════════════

let moveItemId = null, moveFromDay = null;

function openMoveModal(id, fromDay) {
  const item = (state.items[fromDay]||[]).find(i=>i.id===id);
  if (!item) return;
  moveItemId = id; moveFromDay = fromDay;
  document.getElementById('moveItemName').textContent = item.name;
  const suggest = suggestBestDay(item.name, item.address||'');
  const sugLabel = document.getElementById('moveSuggestLabel');
  if (suggest && suggest.day !== fromDay) {
    const meta = DAYS_META[suggest.day-1];
    sugLabel.textContent = `📍 智能推薦：Day ${suggest.day} — ${meta.area}`;
    sugLabel.classList.remove('hidden');
  } else {
    sugLabel.classList.add('hidden');
  }
  const grid = document.getElementById('moveDayGrid');
  grid.innerHTML = DAYS_META.map(m => {
    const isCurrent  = m.day === fromDay;
    const isSuggested = suggest && suggest.day === m.day && m.day !== fromDay;
    return `<button class="move-day-btn${isCurrent?' current':''}${isSuggested?' suggested':''}"
      onclick="doMoveItem(${m.day})">
      Day ${m.day}<span>${m.area}</span>
    </button>`;
  }).join('');
  document.getElementById('moveModal').classList.add('open');
}

function doMoveItem(toDay) {
  if (!moveItemId || !moveFromDay || toDay === moveFromDay) { closeMoveModal(); return; }
  const items = state.items[moveFromDay]||[];
  const idx = items.findIndex(i=>i.id===moveItemId);
  if (idx < 0) { closeMoveModal(); return; }
  const [item] = items.splice(idx, 1);
  if (!state.items[toDay]) state.items[toDay] = [];
  state.items[toDay].push(item);
  saveState(); closeMoveModal();
  const meta = DAYS_META[toDay-1];
  showToast(`✓ 已移到 Day ${toDay} — ${meta.area}`);
  render();
}

function closeMoveModal() {
  document.getElementById('moveModal').classList.remove('open');
  moveItemId = null; moveFromDay = null;
}

function handleMoveOverlay(e) { if (e.target===e.currentTarget) closeMoveModal(); }

function exportBackup() {
  const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),trip:'Seoul 2025',members:ALL4,state},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`seoul-dhub-${new Date().toISOString().slice(0,10)}.json`});
  a.click();URL.revokeObjectURL(a.href);showToast('↓ 備份已下載');
}

// ═══════════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════════

document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(e.key==='Escape') closeModal();
  if(['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
  if(e.key==='ArrowRight'&&currentDay<5) switchDay(currentDay+1);
  if(e.key==='ArrowLeft' &&currentDay>1) switchDay(currentDay-1);
});
