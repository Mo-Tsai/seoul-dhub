<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seoul D-Hub — 首爾行程 2025</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇰🇷</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2EC;
  --card: #FDFAF6;
  --ink: #1C1A17;
  --muted: #6B665E;
  --border: #DDD9D2;
  --accent: #C8432A;
  --accent-bg: #FDF0ED;
  --blue: #3A6E9A;
  --blue-bg: #EBF3FA;
  --green: #3A7A55;
  --green-bg: #EAF4EF;
  --red: #C8432A;
  --red-bg: #FDF0ED;
  --purple: #6B5FA5;
  --purple-bg: #F0EEF9;
  --serif: 'Noto Serif TC', Georgia, serif;
  --mono: 'DM Mono', Consolas, monospace;
  --r: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--ink); font-family: var(--serif); min-height: 100vh; font-size: 14px; line-height: 1.6; }

/* ── HEADER ── */
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: var(--ink); color: var(--bg);
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 24px; gap: 16px;
}
.hdr-title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
.hdr-sub { font-size: 10px; font-family: var(--mono); opacity: 0.5; margin-top: 1px; }
.hdr-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.hbtn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.9); padding: 5px 11px; border-radius: 5px;
  cursor: pointer; font-size: 11px; font-family: var(--mono); transition: background 0.15s; white-space: nowrap;
}
.hbtn:hover { background: rgba(255,255,255,0.2); }
.ver { font-family: var(--mono); font-size: 10px; opacity: 0.3; margin-left: 4px; }

/* ── COLLAPSIBLE PANELS ── */
.panel {
  overflow: hidden; max-height: 0; transition: max-height 0.35s ease;
  border-bottom: 1px solid var(--border);
}
.panel.open { max-height: 300px; }
.panel-flight { background: #fdf5ed; }
.panel-hotel  { background: #edf5fd; }
.panel-inner { padding: 16px 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.fld { display: flex; flex-direction: column; gap: 4px; }
.fld label { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.fld input, .fld textarea {
  background: white; border: 1px solid var(--border); border-radius: 5px;
  padding: 6px 10px; font-family: var(--mono); font-size: 12px; color: var(--ink); outline: none;
}
.fld input { width: 150px; }
.fld input:focus, .fld textarea:focus { border-color: var(--accent); }
.fld textarea { width: 220px; min-height: 48px; resize: none; font-size: 11px; }
.psave {
  background: var(--accent); color: white; border: none; border-radius: 5px;
  padding: 7px 16px; cursor: pointer; font-size: 13px; font-family: var(--serif); align-self: flex-end;
}
.psave:hover { background: #a83520; }
.hotel-maps {
  align-self: flex-end; font-size: 11px; padding: 7px 12px; border-radius: 5px;
  background: var(--blue-bg); color: var(--blue); border: 1px solid #c5dff0;
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}

/* ── DAY TABS ── */
.day-tabs {
  background: var(--card); border-bottom: 2px solid var(--border);
  display: flex; overflow-x: auto; padding: 0 20px; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.tab {
  padding: 11px 18px; cursor: pointer; font-size: 12px; font-weight: 600;
  color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -2px;
  white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--serif); transition: all 0.15s;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-date { display: block; font-size: 9px; font-family: var(--mono); opacity: 0.55; font-weight: 400; margin-top: 1px; }

/* ── LAYOUT ── */
.layout { display: flex; min-height: calc(100vh - 92px); }
.content { flex: 1; padding: 32px 28px; max-width: 720px; min-width: 0; }
.sidebar {
  width: 300px; flex-shrink: 0; background: var(--card);
  border-left: 1px solid var(--border); padding: 24px 18px 24px 20px;
  position: sticky; top: 50px; height: calc(100vh - 50px); overflow-y: auto;
}

/* ── DAY HEADER ── */
.day-header { margin-bottom: 28px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }
.day-header h2 { font-size: 22px; font-weight: 700; }
.day-meta { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }
.show-hidden-btn {
  font-size: 11px; font-family: var(--mono); padding: 5px 10px; border-radius: 5px;
  border: 1px solid var(--border); background: transparent; cursor: pointer;
  color: var(--muted); transition: all 0.15s; white-space: nowrap; align-self: flex-start; margin-top: 4px;
}
.show-hidden-btn:hover { background: var(--border); color: var(--ink); }
.show-hidden-btn.active { background: #fef9e5; border-color: #d4a800; color: #8a6c00; }

/* ── TIMELINE ── */
.timeline { position: relative; }
.timeline::before {
  content: ''; position: absolute;
  left: 79px; top: 12px; bottom: 20px;
  width: 1px; background: var(--border);
}
.tl-item { display: grid; grid-template-columns: 60px 16px 1fr; gap: 0 12px; margin-bottom: 16px; align-items: start; }
.tl-time { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; padding-top: 16px; line-height: 1.4; }
.tl-dot-wrap { display: flex; justify-content: center; padding-top: 18px; position: relative; z-index: 1; }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg); box-shadow: 0 0 0 1.5px var(--border); }

/* ── ITEM CARD ── */
.item-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; transition: box-shadow 0.15s, opacity 0.2s; }
.item-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,0.08); }
.item-card.hidden-item { opacity: 0.45; }
.card-inner { display: flex; }
.card-bar { width: 4px; flex-shrink: 0; }
.card-content { padding: 14px 16px; flex: 1; min-width: 0; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.card-name { font-size: 14px; font-weight: 700; line-height: 1.35; }
.card-nameko { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.card-badge { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; flex-shrink: 0; white-space: nowrap; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
.hidden-label { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; background: #fef9e5; color: #8a6c00; border: 1px solid #d4a800; flex-shrink: 0; margin-top: 2px; white-space: nowrap; }
.card-meta { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
.card-meta-row { font-size: 11px; color: var(--muted); display: flex; gap: 5px; align-items: flex-start; }
.card-desc { font-size: 12px; color: var(--muted); line-height: 1.65; font-style: italic; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; flex-wrap: wrap; gap: 8px; }
.card-who { display: flex; gap: 4px; flex-wrap: wrap; }
.who-tag { font-size: 9px; font-family: var(--mono); padding: 2px 8px; border-radius: 10px; }
.who-mo     { background: #e8e5e0; color: #3a3630; }
.who-kelly  { background: #fde8f2; color: #8a2f5a; }
.who-mia    { background: #ede8f9; color: #5e45a0; }
.who-rui    { background: #e5f0fb; color: #2d5f9b; }
.who-other  { background: rgba(0,0,0,0.06); color: var(--muted); }
.card-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.cbtn {
  font-size: 10px; padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border);
  cursor: pointer; background: transparent; color: var(--muted);
  font-family: var(--mono); transition: all 0.12s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
}
.cbtn:hover { background: var(--border); color: var(--ink); }
.cbtn.maps { color: var(--blue); border-color: #c5dff0; }
.cbtn.maps:hover { background: var(--blue-bg); border-color: var(--blue); }
.cbtn.hide:hover { color: #8a6c00; border-color: #d4a800; background: #fef9e5; }
.cbtn.restore { color: var(--green); border-color: #a5d4b5; }
.cbtn.restore:hover { background: var(--green-bg); }

/* ── RESERVATION STATUS ── */
.resv-badge { font-size: 9px; font-family: var(--mono); padding: 2px 7px; border-radius: 4px; cursor: pointer; flex-shrink: 0; margin-top: 2px; transition: all 0.15s; border: 1px solid transparent; }
.resv-none     { background: #f0eeea; color: var(--muted); border-color: var(--border); }
.resv-pending  { background: #fff4e0; color: #8a5c00; border-color: #e8c56a; }
.resv-booked   { background: #e5f5eb; color: #2a6e42; border-color: #7ec89a; }

/* ── TYPE COLORS ── */
.bar-museum { background: var(--blue); }
.bar-architecture { background: var(--green); }
.bar-restaurant { background: var(--red); }
.bar-other { background: var(--purple); }
.badge-museum { background: var(--blue-bg); color: var(--blue); }
.badge-architecture { background: var(--green-bg); color: var(--green); }
.badge-restaurant { background: var(--red-bg); color: var(--red); }
.badge-other { background: var(--purple-bg); color: var(--purple); }
.dot-museum { background: var(--blue); }
.dot-architecture { background: var(--green); }
.dot-restaurant { background: var(--red); }
.dot-other { background: var(--purple); }
.dot-hidden { background: #ccc; }

/* ── ADD BUTTON ── */
.add-row { padding-left: 88px; margin: 6px 0 32px; }
.add-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
  background: transparent; border: 1.5px dashed var(--border); border-radius: var(--r);
  cursor: pointer; color: var(--muted); font-family: var(--serif); font-size: 13px; transition: all 0.15s;
}
.add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* ── DAY NOTES ── */
.notes-section { margin-bottom: 40px; }
.notes-label { font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 6px; margin-left: 88px; }
.notes-ta {
  width: 100%; min-height: 72px; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  padding: 12px 14px; font-family: var(--serif); font-size: 13px; color: var(--ink);
  resize: vertical; outline: none; transition: border-color 0.15s;
}
.notes-ta:focus { border-color: var(--muted); }

/* ── SIDEBAR ── */
.sb-close-btn { display: none; position: absolute; top: 14px; right: 16px; background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); }
.sb-title { font-size: 10px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 20px; }
.sb-hotel {
  background: var(--blue-bg); border: 1px solid #c5dff0; border-radius: 6px;
  padding: 10px 12px; margin-bottom: 20px; font-size: 11px;
}
.sb-hotel-name { font-weight: 700; font-size: 12px; margin-bottom: 4px; }
.sb-hotel-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); line-height: 1.8; }
.sb-hotel-maps { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; color: var(--blue); text-decoration: none; margin-top: 4px; }
.sb-day { margin-bottom: 20px; }
.sb-day-title { font-size: 11px; font-weight: 700; padding-bottom: 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.sb-day-date { font-family: var(--mono); font-size: 10px; color: var(--muted); font-weight: 400; }
.sb-item { display: flex; gap: 8px; padding: 4px 4px; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
.sb-item:hover { background: rgba(0,0,0,0.04); }
.sb-item.is-hidden { opacity: 0.4; }
.sb-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.sb-info { flex: 1; min-width: 0; }
.sb-name { font-size: 11px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sb-meta { font-size: 10px; font-family: var(--mono); color: var(--muted); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg); border-radius: 12px; padding: 28px;
  width: min(92vw, 500px); max-height: 90vh; overflow-y: auto;
  transform: translateY(16px); transition: transform 0.2s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 22px; }
.fg { margin-bottom: 14px; }
.fg label { display: block; font-size: 9px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 5px; }
.fg input, .fg select, .fg textarea {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 5px; padding: 9px 11px; font-family: var(--serif);
  font-size: 13px; color: var(--ink); outline: none; transition: border-color 0.15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--muted); }
.fg textarea { min-height: 64px; resize: vertical; }
.fg-row { display: flex; gap: 10px; }
.fg-row .fg { flex: 1; }

/* Member checkboxes */
.member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.member-opt {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer;
  transition: all 0.15s; font-size: 13px;
}
.member-opt input[type="checkbox"] { display: none; }
.member-opt.checked-mo     { border-color: #aaa298; background: #f0ede8; }
.member-opt.checked-kelly  { border-color: #d48aaa; background: #fde8f2; }
.member-opt.checked-mia    { border-color: #9985cc; background: #ede8f9; }
.member-opt.checked-rui    { border-color: #6a9fd4; background: #e5f0fb; }
.member-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.md-mo { background: #3a3630; }
.md-kelly { background: #8a2f5a; }
.md-mia { background: #5e45a0; }
.md-rui { background: #2d5f9b; }

.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }
.btn-cancel { padding: 9px 18px; border: 1px solid var(--border); border-radius: 5px; background: transparent; cursor: pointer; font-family: var(--serif); font-size: 13px; color: var(--muted); }
.btn-cancel:hover { background: var(--border); }
.btn-submit { padding: 9px 22px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-family: var(--serif); font-size: 13px; font-weight: 600; }
.btn-submit:hover { background: #a83520; }

/* ── PRINT FAB ── */
.pfab {
  position: fixed; bottom: 24px; right: 24px; background: var(--ink); color: var(--bg);
  border: none; border-radius: 50px; padding: 12px 22px; cursor: pointer;
  font-family: var(--serif); font-size: 12px; font-weight: 600;
  box-shadow: 0 4px 20px rgba(0,0,0,0.18); display: flex; align-items: center; gap: 7px;
  z-index: 50; transition: transform 0.15s;
}
.pfab:hover { transform: translateY(-2px); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 72px; right: 24px; background: var(--ink); color: var(--bg);
  padding: 9px 16px; border-radius: 6px; font-size: 12px; font-family: var(--mono);
  opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; z-index: 300;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── SIDEBAR OVERLAY ── */
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 140; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .sidebar {
    position: fixed; right: 0; top: 0; bottom: 0; z-index: 150;
    transform: translateX(100%); transition: transform 0.3s ease; height: 100vh;
  }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.open { display: block; }
  .sb-close-btn { display: block; }
}
@media (max-width: 600px) {
  .hdr { padding: 10px 14px; }
  .hdr-sub { display: none; }
  .content { padding: 20px 14px; }
  .day-tabs { padding: 0 10px; }
  .tab { padding: 10px 10px; font-size: 11px; }
  .timeline::before { left: 72px; }
  .tl-item { grid-template-columns: 52px 14px 1fr; gap: 0 10px; }
  .add-row { padding-left: 0; }
  .notes-label { margin-left: 0; }
  .member-grid { grid-template-columns: 1fr 1fr; }
}

/* ── PRINT ── */
@media print {
  .hdr-right, .pfab, .sidebar, .sidebar-overlay, .add-row, .card-btns,
  .modal-overlay, .panel, .toast, .show-hidden-btn { display: none !important; }
  .layout { display: block; }
  .content { max-width: 100%; padding: 20px; }
  .item-card { break-inside: avoid; page-break-inside: avoid; margin-bottom: 12px; }
  .item-card.hidden-item { display: none; }
  .hdr { position: relative; background: white !important; color: black !important; }
  body { background: white; }
  .day-tabs { position: relative; overflow: visible; }
  .tab { display: none; }
  .tab.active { display: block; border: none; font-size: 14px; font-weight: 700; padding: 12px 0; }
}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">🇰🇷 Seoul D-Hub</div>
    <div class="hdr-sub">2025 / 7/1–7/5 · Mo · Kelly · Mia · Rui</div>
  </div>
  <div class="hdr-right">
    <button class="hbtn" onclick="togglePanel('panelFlight')">✈ 機票</button>
    <button class="hbtn" onclick="togglePanel('panelHotel')">🏨 住宿</button>
    <button class="hbtn" onclick="toggleSidebar()">≡ 總覽</button>
    <button class="hbtn" onclick="exportBackup()">↓ 備份</button>
    <button class="hbtn" onclick="window.print()">⎙ 列印</button>
    <span class="ver">v1.1</span>
  </div>
</header>

<!-- ── FLIGHT PANEL ── -->
<div id="panelFlight" class="panel panel-flight">
  <div class="panel-inner">
    <div class="fld"><label>去程 班號</label><input id="f_out_no"  type="text" placeholder="CI160"></div>
    <div class="fld"><label>去程 出發</label><input id="f_out_dep" type="text" placeholder="TPE 08:45"></div>
    <div class="fld"><label>去程 抵達</label><input id="f_out_arr" type="text" placeholder="ICN 12:15"></div>
    <div class="fld"><label>回程 班號</label><input id="f_ret_no"  type="text" placeholder="CI161"></div>
    <div class="fld"><label>回程 出發</label><input id="f_ret_dep" type="text" placeholder="ICN 17:00"></div>
    <div class="fld"><label>回程 抵達</label><input id="f_ret_arr" type="text" placeholder="TPE 18:30"></div>
    <button class="psave" onclick="saveFlight()">儲存</button>
  </div>
</div>

<!-- ── HOTEL PANEL ── -->
<div id="panelHotel" class="panel panel-hotel">
  <div class="panel-inner">
    <div class="fld"><label>飯店名稱</label><input id="h_name"    type="text" placeholder="明洞斯坦福飯店"></div>
    <div class="fld"><label>飯店地址</label><input id="h_address" type="text" placeholder="서울 중구 남대문로9길 24"></div>
    <div class="fld"><label>入住日期</label><input id="h_cin"     type="text" placeholder="7/1 15:00"></div>
    <div class="fld"><label>退房日期</label><input id="h_cout"    type="text" placeholder="7/5 11:00"></div>

const STORAGE_KEY = 'seoul_dhub_v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const p = JSON.parse(saved);
      for (let d = 1; d <= 5; d++) {
        if (!p.items[d]) p.items[d] = [];
        if (p.notes[d] === undefined) p.notes[d] = '';
        // migrate old items: add hidden/resv if missing
        p.items[d].forEach(i => {
          if (i.hidden === undefined) i.hidden = false;
          if (!i.resv) i.resv = 'none';
        });
      }
      if (!p.hotel) p.hotel = { ...DEFAULT_HOTEL };
      return p;
    }
  } catch(e) {}
  return {
    flight: { out_no:'', out_dep:'', out_arr:'', ret_no:'', ret_dep:'', ret_arr:'' },
    hotel:  { ...DEFAULT_HOTEL },
    items:  JSON.parse(JSON.stringify(DEFAULT_ITEMS)),
    notes:  { 1:'', 2:'', 3:'', 4:'', 5:'' },
  };
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function mapsUrl(addr) {

}
const TYPE_LABEL = { museum:'美術館', architecture:'建築', restaurant:'餐廳', other:'其他' };

function whoClass(name) {
  const map = { Mo:'who-mo', Kelly:'who-kelly', Mia:'who-mia', Rui:'who-rui' };
  return map[name] || 'who-other';
}

function suggestNextTime(dayNum) {
  const visible = (state.items[dayNum]||[]).filter(i => !i.hidden);
  if (!visible.length) return { start:'10:00', end:'12:00' };
  const sorted = [...visible].sort((a,b) => a.time.localeCompare(b.time));
  const last = sorted[sorted.length - 1];
  const [h,m] = (last.endTime || last.time).split(':').map(Number);
  const s = h*60 + m + 30, e = s + 90;
  const pad = n => String(Math.floor(n)).padStart(2,'0');
  return { start:`${pad(s/60)}:${pad(s%60)}`, end:`${pad(e/60)}:${pad(e%60)}` };
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2200);
}

function uid() { return 'u_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  const item = (state.items[dayNum]||[]).find(i => i.id === id);
  if (!item) return;
  item.hidden = !item.hidden;
  saveState();
  render();
  showToast(item.hidden ? '🙈 已隱藏' : '↩ 已恢復顯示');
}

function cycleResv(id, dayNum) {
  const item = (state.items[dayNum]||[]).find(i => i.id === id);
  if (!item) return;
  const idx = RESV_CYCLE.indexOf(item.resv||'none');
  item.resv = RESV_CYCLE[(idx + 1) % RESV_CYCLE.length];
  saveState();
  render();
  showToast(`預約狀態：${RESV_LABEL[item.resv]}`);
}

function noteInput(day, val) {
  clearTimeout(noteTimers[day]);
  noteTimers[day] = setTimeout(() => {
    state.notes[day] = val; saveState(); showToast('備註已自動儲存');
  }, 900);
}

// ── PANELS ──
function togglePanel(id) {
  const el = document.getElementById(id);
  const isOpen = el.classList.contains('open');
  // close all panels first
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function syncPanelUI() {
  const f = state.flight, h = state.hotel;
  document.getElementById('f_out_no').value  = f.out_no  || '';
  document.getElementById('f_out_dep').value = f.out_dep || '';
  document.getElementById('f_out_arr').value = f.out_arr || '';
  document.getElementById('f_ret_no').value  = f.ret_no  || '';
  document.getElementById('f_ret_dep').value = f.ret_dep || '';
  document.getElementById('f_ret_arr').value = f.ret_arr || '';
  document.getElementById('h_name').value    = h.name    || '';
  document.getElementById('h_address').value = h.address || '';
  document.getElementById('h_cin').value     = h.cin     || '';
  document.getElementById('h_cout').value    = h.cout    || '';
  document.getElementById('h_conf').value    = h.conf    || '';
  document.getElementById('h_phone').value   = h.phone   || '';
  document.getElementById('h_notes').value   = h.notes   || '';
}

function saveFlight() {
  state.flight = {
    out_no:  document.getElementById('f_out_no').value.trim(),
    out_dep: document.getElementById('f_out_dep').value.trim(),
    out_arr: document.getElementById('f_out_arr').value.trim(),
    ret_no:  document.getElementById('f_ret_no').value.trim(),
    ret_dep: document.getElementById('f_ret_dep').value.trim(),
    ret_arr: document.getElementById('f_ret_arr').value.trim(),
  };
  saveState(); showToast('✈ 機票已儲存');
  document.getElementById('panelFlight').classList.remove('open');
}

function saveHotel() {
  state.hotel = {
    name:    document.getElementById('h_name').value.trim(),
    address: document.getElementById('h_address').value.trim(),
    cin:     document.getElementById('h_cin').value.trim(),
    cout:    document.getElementById('h_cout').value.trim(),
    conf:    document.getElementById('h_conf').value.trim(),
    phone:   document.getElementById('h_phone').value.trim(),
    notes:   document.getElementById('h_notes').value.trim(),
  };
  saveState(); showToast('🏨 住宿已儲存'); render();
  document.getElementById('panelHotel').classList.remove('open');
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════

function toggleMember(name) {
  const cb  = document.getElementById('w_' + name);
  const opt = document.getElementById('opt_' + name);
  cb.checked = !cb.checked;
  const m = MEMBERS.find(m => m.id.toLowerCase() === name.toLowerCase());
  if (m) opt.classList.toggle(m.optCls, cb.checked);
}

function openModal(day) {
  document.getElementById('m_day').value = String(day);
  const { start, end } = suggestNextTime(day);
  document.getElementById('m_time').value    = start;
  document.getElementById('m_endtime').value = end;
  ['m_name','m_nameko','m_address','m_admission','m_hours','m_desc'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('m_type').value = 'other';
  // reset member opts
  MEMBERS.forEach(m => {
    const cb  = document.getElementById('w_' + m.id.toLowerCase());
    const opt = document.getElementById('opt_' + m.id.toLowerCase());
    cb.checked = false;
    opt.classList.remove(m.optCls);
  });
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('m_name').focus(), 200);
}

function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }

function submitAdd() {
  const name = document.getElementById('m_name').value.trim();
  if (!name) { document.getElementById('m_name').focus(); return; }
  const dayNum = parseInt(document.getElementById('m_day').value, 10);
  const who = MEMBERS
    .filter(m => document.getElementById('w_' + m.id.toLowerCase()).checked)
    .map(m => m.id);
  const item = {
    id:        uid(),
    type:      document.getElementById('m_type').value,
    hidden:    false,
    resv:      'none',
    name,
    nameKo:    document.getElementById('m_nameko').value.trim(),
    time:      document.getElementById('m_time').value    || '12:00',
    endTime:   document.getElementById('m_endtime').value || '',
    hours:     document.getElementById('m_hours').value.trim(),
    admission: document.getElementById('m_admission').value.trim(),
    desc:      document.getElementById('m_desc').value.trim(),
    address:   document.getElementById('m_address').value.trim(),
    who,
    isDefault: false,
  };
  if (!state.items[dayNum]) state.items[dayNum] = [];
  state.items[dayNum].push(item);
  saveState(); currentDay = dayNum; closeModal(); render();
  showToast('✅ 已加入 Day ' + dayNum);
}

// ════════════════════════════════════════════
//  EXPORT
// ════════════════════════════════════════════

function exportBackup() {
  const blob = new Blob([JSON.stringify({
    exported: new Date().toISOString(),
    trip: 'Seoul 2025 — 7/1–7/5',
    members: ['Mo','Kelly','Mia','Rui'],
    state
  }, null, 2)], { type:'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `seoul-dhub-${new Date().toISOString().slice(0,10)}.json`
  });
  a.click(); URL.revokeObjectURL(a.href);
  showToast('↓ 備份已下載');
}

// ════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════

document.addEventListener('keydown', e => {
  const tag = document.activeElement.tagName;
  if (e.key === 'Escape') closeModal();
  if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
  if (e.key === 'ArrowRight' && currentDay < 5) switchDay(currentDay + 1);
  if (e.key === 'ArrowLeft'  && currentDay > 1) switchDay(currentDay - 1);
});

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
render();
</script>
